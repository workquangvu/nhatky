<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhật Ký — @quangvu.ta</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1a1a;
    --paper:     #f5f2ec;
    --paper-2:   #edeae2;
    --accent:    #b85c2c;
    --muted:     #8a8278;
    --border:    #d4cfc6;
    --recording: #c0392b;
    --success:   #2e7d52;
    --radius:    8px;
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: baseline; gap: 12px; }

  .logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
  }

  .date-display { font-size: 13px; color: var(--muted); font-weight: 300; }

  /* DRIVE STATUS */
  .drive-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .drive-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .drive-dot.connected { background: var(--success); }
  .drive-dot.connecting { background: #f39c12; animation: blink 1s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #connectBtn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }

  #connectBtn:hover { border-color: var(--accent); color: var(--accent); }
  #connectBtn.connected { border-color: var(--success); color: var(--success); }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 32px;
  }

  .panel { display: flex; flex-direction: column; gap: 16px; }

  .panel-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .record-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 36px 24px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: white;
  }

  #recordBtn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  #recordBtn:hover { background: var(--accent); transform: scale(1.04); }
  #recordBtn.recording { background: var(--recording); animation: pulse 1.4s ease-in-out infinite; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(192,57,43,0); }
  }

  .record-status { font-size: 13px; color: var(--muted); text-align: center; min-height: 20px; }
  .record-status.active { color: var(--recording); font-weight: 500; }

  textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: white;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #ccc; }

  #transcriptRaw { min-height: 160px; }
  #editor { min-height: 340px; flex: 1; }

  .btn-row { display: flex; gap: 10px; }

  .btn {
    padding: 10px 20px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--ink); color: white; flex: 1; }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }

  .btn-secondary {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--ink); }

  .btn-drive {
    background: white;
    color: var(--success);
    border: 1.5px solid var(--success);
    flex: 1;
  }
  .btn-drive:hover { background: var(--success); color: white; }
  .btn-drive:disabled { opacity: 0.4; cursor: not-allowed; }

  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Be Vietnam Pro', sans-serif;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }

  .meta-row { display: flex; justify-content: space-between; align-items: center; }
  .word-count { font-size: 11px; color: var(--muted); }

  .folder-info {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 12px;
    background: var(--paper-2);
    border-radius: 6px;
    display: none;
  }
  .folder-info.show { display: block; }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--success); }
  #toast.error { background: var(--recording); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">Nhật Ký</div>
    <div class="date-display" id="dateDisplay"></div>
  </div>
  <div class="drive-status">
    <div class="drive-dot" id="driveDot"></div>
    <span id="driveStatusText">Chưa kết nối Drive</span>
    <button id="connectBtn" onclick="handleAuth()">Kết nối Google Drive</button>
  </div>
</header>

<main>
  <!-- LEFT: GHI ÂM -->
  <div class="panel">
    <div class="panel-label">Ghi âm</div>

    <div class="record-area">
      <button id="recordBtn" title="Bắt đầu ghi âm">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="record-status" id="recordStatus">Bấm để bắt đầu nói</div>
    </div>

    <div class="panel-label">Transcript thô</div>
    <textarea id="transcriptRaw" placeholder="Transcript hiện ở đây khi mày nói..."></textarea>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="processText()">Xử lý →</button>
      <button class="btn btn-secondary" onclick="clearRaw()">Xóa</button>
    </div>
  </div>

  <!-- RIGHT: NHẬT KÝ -->
  <div class="panel">
    <div class="meta-row">
      <div class="panel-label">Nhật ký hôm nay</div>
      <div class="word-count" id="wordCount">0 từ</div>
    </div>

    <textarea id="editor" placeholder="Nội dung nhật ký..."></textarea>

    <div class="tag-row">
      <span class="tag" onclick="insertSection('## Hôm nay')">+ Hôm nay</span>
      <span class="tag" onclick="insertSection('## Insight thô')">+ Insight</span>
      <span class="tag" onclick="insertSection('## Content?')">+ Content?</span>
    </div>

    <div class="folder-info" id="folderInfo"></div>

    <div class="btn-row">
      <button class="btn btn-drive" id="savedriveBtn" onclick="saveToDrive()" disabled>☁ Lưu lên Drive</button>
      <button class="btn btn-secondary" onclick="saveLocal()">💾 Lưu local</button>
      <button class="btn btn-secondary" onclick="clearEditor()">Xóa</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ================================================
// CONFIG
// ================================================
const CLIENT_ID = '203565118158-5qbdht79qpk0ktvtrjqgg4psolsoufle.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const FOLDER_PATH = ['QUANGVU_WORKSPACE', '05_BRAIN', 'NhatKy'];

// ================================================
// DATE
// ================================================
const now = new Date();
const pad = n => String(n).padStart(2, '0');
const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
const monthFolder = `${pad(now.getMonth()+1)}_Thang${now.getMonth()+1}`;
const yearFolder = `${now.getFullYear()}`;

document.getElementById('dateDisplay').textContent =
  now.toLocaleDateString('vi-VN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// Init editor
const editor = document.getElementById('editor');
editor.value = `# Nhật ký — ${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}\n\n## Hôm nay làm gì / gặp ai / thấy gì đáng chú ý\n...\n\n## Insight thô\n...\n\n## Có thể thành content không?\n[ ] Có → move sang Ideas/\n[ ] Chưa biết → để đây\n[ ] Không\n`;
updateWordCount();

// ================================================
// GOOGLE AUTH
// ================================================
let accessToken = null;
let tokenClient = null;

window.onload = () => {
  google.accounts.id.initialize({ client_id: CLIENT_ID });
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showToast('Lỗi đăng nhập: ' + resp.error, 'error'); return; }
      accessToken = resp.access_token;
      setDriveStatus('connected');
    }
  });
};

function handleAuth() {
  if (accessToken) {
    accessToken = null;
    setDriveStatus('disconnected');
    return;
  }
  setDriveStatus('connecting');
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function setDriveStatus(status) {
  const dot = document.getElementById('driveDot');
  const text = document.getElementById('driveStatusText');
  const btn = document.getElementById('connectBtn');
  const saveBtn = document.getElementById('savedriveBtn');

  if (status === 'connected') {
    dot.className = 'drive-dot connected';
    text.textContent = 'Drive đã kết nối';
    btn.textContent = 'Ngắt kết nối';
    btn.className = 'connected';
    saveBtn.disabled = false;
    showToast('✓ Đã kết nối Google Drive', 'success');
  } else if (status === 'connecting') {
    dot.className = 'drive-dot connecting';
    text.textContent = 'Đang kết nối...';
  } else {
    dot.className = 'drive-dot';
    text.textContent = 'Chưa kết nối Drive';
    btn.textContent = 'Kết nối Google Drive';
    btn.className = '';
    saveBtn.disabled = true;
  }
}

// ================================================
// DRIVE API — tìm hoặc tạo folder
// ================================================
async function getOrCreateFolder(name, parentId = 'root') {
  const query = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  if (data.files && data.files.length > 0) return data.files[0].id;

  // Tạo mới
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  const folder = await create.json();
  return folder.id;
}

async function saveToDrive() {
  if (!accessToken) { showToast('Kết nối Drive trước', 'error'); return; }
  const content = editor.value.trim();
  if (!content) { showToast('Chưa có nội dung', 'error'); return; }

  showToast('Đang lưu lên Drive...');

  try {
    // Tìm/tạo folder path: QUANGVU_WORKSPACE/05_BRAIN/NhatKy/2026/06_Thang6
    let folderId = 'root';
    for (const name of FOLDER_PATH) {
      folderId = await getOrCreateFolder(name, folderId);
    }
    folderId = await getOrCreateFolder(yearFolder, folderId);
    folderId = await getOrCreateFolder(monthFolder, folderId);

    const filename = `${dateStr}_NhatKy.md`;

    // Check file đã tồn tại chưa
    const query = `name='${filename}' and '${folderId}' in parents and trashed=false`;
    const check = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id)`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const checkData = await check.json();

    let response;
    if (checkData.files && checkData.files.length > 0) {
      // Update file cũ
      const fileId = checkData.files[0].id;
      response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'text/markdown' },
        body: content
      });
    } else {
      // Tạo file mới (2 bước: metadata + content)
      const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: filename, parents: [folderId], mimeType: 'text/markdown' })
      });
      const metaData = await meta.json();
      response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${metaData.id}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'text/markdown' },
        body: content
      });
    }

    if (response.ok) {
      const folderDisplayPath = `QUANGVU_WORKSPACE/05_BRAIN/NhatKy/${yearFolder}/${monthFolder}/`;
      const info = document.getElementById('folderInfo');
      info.textContent = `✓ Đã lưu: ${folderDisplayPath}${filename}`;
      info.className = 'folder-info show';
      showToast('✓ Đã lưu lên Drive', 'success');
    } else {
      showToast('Lỗi lưu file', 'error');
    }
  } catch (err) {
    showToast('Lỗi: ' + err.message, 'error');
  }
}

// ================================================
// SPEECH RECOGNITION
// ================================================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;
let fullTranscript = '';

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'vi-VN';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    fullTranscript += final;
    document.getElementById('transcriptRaw').value = fullTranscript + interim;
  };

  recognition.onerror = (e) => { setStatus('Lỗi: ' + e.error, false); stopRecording(); };
  recognition.onend = () => { if (isRecording) recognition.start(); };
}

document.getElementById('recordBtn').onclick = () => {
  if (!recognition) { showToast('Dùng Chrome hoặc Edge để ghi âm', 'error'); return; }
  isRecording ? stopRecording() : startRecording();
};

function startRecording() {
  fullTranscript = document.getElementById('transcriptRaw').value;
  isRecording = true;
  recognition.start();
  document.getElementById('recordBtn').classList.add('recording');
  setStatus('Đang nghe...', true);
}

function stopRecording() {
  isRecording = false;
  recognition.stop();
  document.getElementById('recordBtn').classList.remove('recording');
  setStatus('Bấm để bắt đầu nói', false);
}

function setStatus(msg, active) {
  const el = document.getElementById('recordStatus');
  el.textContent = msg;
  el.className = 'record-status' + (active ? ' active' : '');
}

// ================================================
// PROCESS TEXT
// ================================================
function processText() {
  const raw = document.getElementById('transcriptRaw').value.trim();
  if (!raw) { showToast('Chưa có transcript', 'error'); return; }

  let text = raw;
  const fillers = [
    /\b(ừ+|uh+|um+|eh+|ah+|à+|ờ+|ơ+|ừm+)\b/gi,
    /\b(thì là|mà thì|tức là|kiểu như|kiểu là|nghĩa là|như là)\b/gi,
  ];
  fillers.forEach(f => { text = text.replace(f, ''); });
  text = text.replace(/\s{2,}/g, ' ').trim();

  const sentences = text.split(/[.!?]\s+/);
  const unique = [];
  sentences.forEach(s => {
    const c = s.trim().toLowerCase();
    const prev = unique.length > 0 ? unique[unique.length-1].trim().toLowerCase() : '';
    if (c && c !== prev && c.length > 3) unique.push(s.trim());
  });
  text = unique.join('. ');
  if (text && !text.match(/[.!?]$/)) text += '.';

  const marker = '## Hôm nay làm gì / gặp ai / thấy gì đáng chú ý\n';
  const idx = editor.value.indexOf(marker);
  if (idx !== -1) {
    const before = editor.value.substring(0, idx + marker.length);
    const after = editor.value.substring(before.length).replace(/^\.\.\./, '');
    editor.value = before + text + '\n' + after;
  } else {
    editor.value += '\n\n' + text;
  }
  updateWordCount();
  showToast('Đã xử lý và đưa vào nhật ký');
}

// ================================================
// EDITOR UTILS
// ================================================
editor.addEventListener('input', updateWordCount);

function updateWordCount() {
  const words = editor.value.trim().split(/\s+/).filter(w => w.length > 0).length;
  document.getElementById('wordCount').textContent = words + ' từ';
}

function insertSection(title) {
  const pos = editor.selectionStart;
  editor.value = editor.value.substring(0, pos) + '\n\n' + title + '\n...\n' + editor.value.substring(pos);
  editor.focus();
  updateWordCount();
}

function clearRaw() {
  document.getElementById('transcriptRaw').value = '';
  fullTranscript = '';
}

function clearEditor() {
  if (confirm('Xóa toàn bộ nhật ký hôm nay?')) {
    editor.value = `# Nhật ký — ${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}\n\n## Hôm nay làm gì / gặp ai / thấy gì đáng chú ý\n...\n\n## Insight thô\n...\n\n## Có thể thành content không?\n[ ] Có → move sang Ideas/\n[ ] Chưa biết → để đây\n[ ] Không\n`;
    updateWordCount();
  }
}

async function saveLocal() {
  const content = editor.value.trim();
  if (!content) { showToast('Chưa có nội dung', 'error'); return; }
  const filename = `${dateStr}_NhatKy.md`;
  try {
    if (window.showSaveFilePicker) {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
    } else {
      const blob = new Blob([content], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    showToast('✓ Đã lưu ' + filename, 'success');
  } catch (err) {
    if (err.name !== 'AbortError') showToast('Lỗi: ' + err.message, 'error');
  }
}

// ================================================
// TOAST
// ================================================
let toastTimer;
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ''; }, 3000);
}
</script>
</body>
</html>
